<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Better Todos for Trello</title>
        <link rel="stylesheet" href="popup.css" />
    </head>
    <body>
        <header>
            <img src="icons/icon-16.png" alt="" />
            <h1>Better Todos for Trello</h1>
        </header>

        <div class="settings">
            <div class="row">
                <label for="noStrikethrough">Remove strikethrough</label>
                <label class="toggle">
                    <input type="checkbox" id="noStrikethrough" />
                    <span class="toggle-track"></span>
                </label>
            </div>

            <div class="row">
                <label for="showCheckIcon">Add ✓ icon after item</label>
                <label class="toggle">
                    <input type="checkbox" id="showCheckIcon" />
                    <span class="toggle-track"></span>
                </label>
            </div>

            <div class="row color-row">
                <label>Completed item color</label>
                <div class="swatches">
                    <div class="swatch" data-color="" title="Default"></div>
                    <div
                        class="swatch"
                        data-color="#a6da58"
                        style="background: #a6da58"
                        title="Green"></div>
                    <div
                        class="swatch"
                        data-color="#8abeff"
                        style="background: #8abeff"
                        title="Blue"></div>
                    <div
                        class="swatch"
                        data-color="#94a3b8"
                        style="background: #94a3b8"
                        title="Grey"></div>
                    <div
                        class="swatch"
                        data-color="#facc15"
                        style="background: #facc15"
                        title="Yellow"></div>
                    <div
                        class="swatch swatch-custom"
                        title="Custom color"
                        id="customSwatch">
                        <input type="color" id="customColor" value="#a6da58" />
                    </div>
                </div>
            </div>
        </div>

        <div class="section-heading">Chip Packs</div>

        <div class="chip-pack-row">
            <label for="chipsEnabled">Show chip badges</label>
            <label class="toggle">
                <input type="checkbox" id="chipsEnabled" />
                <span class="toggle-track"></span>
            </label>
        </div>

        <div class="chip-pack-row">
            <label for="chipPack">Active pack</label>
            <select id="chipPack"></select>
        </div>

        <div class="chip-list" id="chipList"></div>

        <div id="saved">Saved</div>

        <footer>Changes apply instantly on Trello</footer>

        <script src="popup.js"></script>
    </body>
</html>
