<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Better Todos for Trello</title>
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                width: 260px;
                font-family:
                    ui-sans-serif,
                    -apple-system,
                    BlinkMacSystemFont,
                    'Segoe UI',
                    sans-serif;
                font-size: 13px;
                background: #1d2125;
                color: #b6c2cf;
            }

            header {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 12px 14px 10px;
                border-bottom: 1px solid #2c333a;
            }

            header img {
                width: 20px;
                height: 20px;
            }

            header h1 {
                font-size: 13px;
                font-weight: 600;
                color: #e2e8f0;
                letter-spacing: 0.01em;
            }

            .settings {
                padding: 0 14px;
                display: flex;
                flex-direction: column;
            }

            .row {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 10px;
                padding: 12px 0;
                border-bottom: 1px solid #2c333a;
            }

            .row:last-child {
                border-bottom: none;
            }

            .row > label:not(.toggle) {
                flex: 1;
                color: #b6c2cf;
                cursor: pointer;
                user-select: none;
            }

            /* Toggle switch */
            .toggle {
                position: relative;
                width: 32px;
                height: 18px;
                flex-shrink: 0;
            }
            .toggle input {
                opacity: 0;
                width: 0;
                height: 0;
                position: absolute;
            }
            .toggle-track {
                position: absolute;
                inset: 0;
                background: #454f59;
                border-radius: 18px;
                cursor: pointer;
                transition: background 0.2s;
            }
            .toggle-track::after {
                content: '';
                position: absolute;
                top: 2px;
                left: 2px;
                width: 14px;
                height: 14px;
                background: #fff;
                border-radius: 50%;
                transition: transform 0.2s;
            }
            .toggle input:checked + .toggle-track {
                background: #579dff;
            }
            .toggle input:checked + .toggle-track::after {
                transform: translateX(14px);
            }

            /* Color swatches */
            .color-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 6px;
            }
            .color-row > label {
                margin-bottom: 0;
            }

            .swatches {
                display: flex;
                gap: 6px;
                flex-wrap: wrap;
            }

            .swatch {
                width: 22px;
                height: 22px;
                border-radius: 50%;
                border: 2px solid transparent;
                cursor: pointer;
                transition:
                    border-color 0.15s,
                    transform 0.15s;
            }
            .swatch:hover {
                transform: scale(1.15);
            }
            .swatch.active {
                border-color: #fff;
            }
            .swatch[data-color=''] {
                background: #454f59;
                position: relative;
            }
            .swatch[data-color='']::after {
                content: '×';
                position: absolute;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 14px;
                color: #b6c2cf;
                line-height: 1;
                display: grid;
                place-items: center;
            }

            .swatch-custom {
                background: linear-gradient(
                    to right,
                    #f87171,
                    #facc15,
                    #4ade80,
                    #60a5fa,
                    #c084fc
                );
                position: relative;
                overflow: hidden;
            }
            .swatch-custom input[type='color'] {
                position: absolute;
                inset: 0;
                opacity: 0;
                width: 100%;
                height: 100%;
                cursor: pointer;
                border: none;
                padding: 0;
            }

            footer {
                padding: 8px 14px;
                border-top: 1px solid #2c333a;
                font-size: 11px;
                color: #596773;
                text-align: center;
            }

            #saved {
                display: none;
                font-size: 11px;
                color: #579dff;
                text-align: center;
                padding: 8px 14px;
            }
        </style>
    </head>
    <body>
        <header>
            <img src="icons/icon-16.png" alt="" />
            <h1>Better Todos for Trello</h1>
        </header>

        <div class="settings">
            <div class="row">
                <label for="noStrikethrough">Remove strikethrough</label>
                <label class="toggle">
                    <input type="checkbox" id="noStrikethrough" />
                    <span class="toggle-track"></span>
                </label>
            </div>

            <div class="row">
                <label for="showCheckIcon">Add ✓ icon after item</label>
                <label class="toggle">
                    <input type="checkbox" id="showCheckIcon" />
                    <span class="toggle-track"></span>
                </label>
            </div>

            <div class="row color-row">
                <label>Completed item color</label>
                <div class="swatches">
                    <div class="swatch" data-color="" title="Default"></div>
                    <div
                        class="swatch"
                        data-color="#94c748"
                        style="background: #94c748"
                        title="Green"></div>
                    <div
                        class="swatch"
                        data-color="#60a5fa"
                        style="background: #60a5fa"
                        title="Blue"></div>
                    <div
                        class="swatch"
                        data-color="#94a3b8"
                        style="background: #94a3b8"
                        title="Grey"></div>
                    <div
                        class="swatch"
                        data-color="#facc15"
                        style="background: #facc15"
                        title="Yellow"></div>
                    <div
                        class="swatch swatch-custom"
                        title="Custom color"
                        id="customSwatch">
                        <input type="color" id="customColor" value="#94c748" />
                    </div>
                </div>
            </div>
        </div>

        <div id="saved">Saved</div>

        <footer>Changes apply instantly on Trello</footer>

        <script src="popup.js"></script>
    </body>
</html>
